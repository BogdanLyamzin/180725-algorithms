<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      const calcObjOwnProperties = (obj) => {
        const keys = Object.keys(obj);
        let count = 0;
        for (const key of keys) {
          if (obj.hasOwnProperty(key)) {
            count += 1;
          }
        }
        return count;
      };
      const sortArr = (arr) => {
        const cloneArr = [...arr];
        const result = [];
        while (cloneArr.length) {
          let maxValue = cloneArr[0];
          let maxValueIndex = 0;
          for (let i = 1; i < cloneArr.length; i += 1) {
            if (cloneArr[i] > maxValue) {
              maxValue = cloneArr[i];
              maxValueIndex = i;
            }
          }
          cloneArr.splice(maxValueIndex, 1);
          result.push(maxValue);
        }
        return result;
      };

      const arr = [5, 3, 2, 8];

      //   console.log(arr);
      //   console.log(sortArr(arr)); // O(n^2)

      function mergeSort(arr) {
        if (arr.length === 1 || arr.length === 0) {
          return arr;
        }

        const leftArr = mergeSort(arr.slice(0, Math.floor(arr.length / 2))); // [5, 3]
        const rightArr = mergeSort(arr.slice(Math.floor(arr.length / 2))); // [2, 8]
        let n = 0,
          m = 0,
          k = 0;
        const result = new Array(arr.length);

        while (n < leftArr.length && m < rightArr.length) {
          if (leftArr[n] <= rightArr[m]) {
            result[k] = leftArr[n];
            n++;
          } else {
            result[k] = rightArr[m];
            m++;
          }
          k++;
        }
        while (n < leftArr.length) {
          result[k] = leftArr[n];
          n++;
          k++;
        }

        while (m < rightArr.length) {
          result[k] = rightArr[m];
          m++;
          k++;
        }

        return result;
      }
      const sortedArr = sortArr(arr);
      console.log(sortedArr);
    </script>
  </body>
</html>
